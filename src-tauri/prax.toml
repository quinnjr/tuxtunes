# TuxTunes Prax runtime configuration.

[database]
provider = "sqlite"
# Set at runtime by AppState::new via the DATABASE_URL env var.
url = "${DATABASE_URL}"

[database.pool]
min_connections = 1
max_connections = 4
connect_timeout = "5s"
idle_timeout = "10m"
max_lifetime = "30m"

[schema]
path = "prax/schema.prax"

[generator.client]
output = "./src/generated"
async_client = true

[migrations]
directory = "./prax/migrations"
auto_migrate = false
table_name = "_prax_migrations"

[debug]
log_queries = false
pretty_sql = true
slow_query_threshold = 1000
