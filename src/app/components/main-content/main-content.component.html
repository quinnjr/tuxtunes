<section class="flex h-full flex-1 flex-col bg-[var(--color-bg-primary)]">
  <header class="flex items-center gap-2 border-b border-[var(--color-border)] px-4 py-2">
    @for (mode of modes; track mode) {
      <button
        type="button"
        [class]="
          viewMode() === mode
            ? 'rounded bg-[var(--color-accent)] px-3 py-1 text-sm capitalize text-white transition'
            : 'rounded px-3 py-1 text-sm capitalize text-[var(--color-text-secondary)] transition hover:text-[var(--color-accent)]'
        "
        (click)="setMode(mode)"
      >
        {{ mode }}
      </button>
    }
    <div class="ml-auto flex items-center gap-2">
      <div
        class="flex items-center gap-2 rounded border border-[var(--color-border)] bg-[var(--color-bg-surface)] px-2 py-1 text-sm focus-within:border-[var(--color-accent)]"
      >
        <input
          type="search"
          placeholder="Search title, artist, album…"
          [value]="library.search()"
          (input)="onSearchInput($event)"
          class="w-56 bg-transparent text-[var(--color-text-primary)] outline-none placeholder:text-[var(--color-text-muted)]"
        />
        @if (library.search().length > 0) {
          <button
            type="button"
            (click)="clearSearch()"
            aria-label="Clear search"
            class="text-xs text-[var(--color-text-muted)] hover:text-[var(--color-accent)]"
          >
            ✕
          </button>
        }
      </div>
      <button
        type="button"
        (click)="toggleBrowser()"
        [class]="
          ui.columnBrowserOpen()
            ? 'rounded bg-[var(--color-accent)] px-3 py-1 text-sm text-white'
            : 'rounded border border-[var(--color-border)] px-3 py-1 text-sm text-[var(--color-text-secondary)] hover:text-[var(--color-accent)]'
        "
        title="Toggle Column Browser"
      >
        Browse
      </button>
    </div>
  </header>
  <div class="flex flex-1 flex-col overflow-hidden">
    @if (ui.columnBrowserOpen() && viewMode() !== 'settings') {
      <div class="h-56 shrink-0 border-b border-[var(--color-border)]">
        <app-column-browser class="block h-full" />
      </div>
    }
    <div class="flex-1 overflow-hidden">
      @switch (viewMode()) {
        @case ('tracks') {
          <app-track-list-view class="block h-full" />
        }
        @case ('albums') {
          <app-album-grid-view class="block h-full" />
        }
        @case ('artists') {
          <app-artist-split-view class="block h-full" />
        }
        @case ('settings') {
          <app-settings-route class="block h-full" />
        }
        @default {
          <div class="flex h-full items-center justify-center text-[var(--color-text-muted)]">
            {{ viewMode() }} view — coming soon
          </div>
        }
      }
    </div>
  </div>
</section>
