<div
  class="grid h-24 grid-cols-[240px_1fr_240px] items-center border-b border-[var(--color-border-strong)] bg-[var(--color-bg-transport)] px-4"
>
  <div class="flex items-center gap-3 text-[var(--color-text-secondary)]">
    <button class="text-2xl transition hover:text-[var(--color-accent)]" aria-label="Previous">
      <fa-icon [icon]="faPrev" />
    </button>
    <button
      class="text-3xl text-[var(--color-accent)] transition hover:text-[var(--color-accent-hover)]"
      (click)="togglePlay()"
      [attr.aria-label]="playback.state() === 'playing' ? 'Pause' : 'Play'"
    >
      <fa-icon [icon]="playback.state() === 'playing' ? faPause : faPlay" />
    </button>
    <button
      class="text-2xl transition hover:text-[var(--color-accent)]"
      (click)="stop()"
      aria-label="Stop"
    >
      <fa-icon [icon]="faStop" />
    </button>
    <button class="text-2xl transition hover:text-[var(--color-accent)]" aria-label="Next">
      <fa-icon [icon]="faNext" />
    </button>
  </div>

  <div
    class="mx-4 flex h-16 items-center rounded border border-[var(--color-border)] bg-[var(--color-bg-elevated)] px-4 shadow-inner"
  >
    <div class="h-12 w-12 flex-shrink-0 rounded bg-[var(--color-bg-tertiary)]"></div>
    <div class="ml-3 flex min-w-0 flex-1 flex-col">
      @if (currentTrack(); as t) {
        <span class="truncate text-sm font-semibold text-[var(--color-text-primary)]">
          {{ t.title }}
        </span>
        <span class="truncate text-xs text-[var(--color-text-muted)]">
          {{ t.artist ?? '' }} — {{ t.album ?? '' }}
        </span>
        <div class="mt-1 flex items-center gap-2">
          <input
            type="range"
            min="0"
            [max]="t.durationMs"
            [value]="playback.positionMs()"
            (change)="onSeek($event)"
            class="h-1 flex-1 cursor-pointer"
          />
          <span class="font-mono text-xs text-[var(--color-text-muted)]">
            {{ formatTime(playback.positionMs()) }} / {{ formatTime(t.durationMs) }}
          </span>
        </div>
      } @else {
        <span class="text-sm font-semibold text-[var(--color-text-primary)]">Nothing playing</span>
        <span class="text-xs text-[var(--color-text-muted)]">—</span>
      }
    </div>
  </div>

  <div class="flex items-center justify-end gap-3 text-[var(--color-text-secondary)]">
    <fa-icon [icon]="faVolumeUp" />
    <input
      type="range"
      min="0"
      max="100"
      [value]="playback.volume()"
      (input)="onVolumeInput($event)"
      class="h-1 w-24 cursor-pointer"
    />
  </div>
</div>
