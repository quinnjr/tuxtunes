<div
  class="grid h-24 grid-cols-[240px_1fr_240px] items-center border-b border-[var(--color-border-strong)] bg-[var(--color-bg-transport)] px-4"
>
  <div class="flex items-center gap-3 text-[var(--color-text-secondary)]">
    <button class="text-2xl transition hover:text-[var(--color-accent)]" aria-label="Previous">
      <fa-icon [icon]="faPrev" />
    </button>
    <button
      class="text-3xl text-[var(--color-accent)] transition hover:text-[var(--color-accent-hover)]"
      aria-label="Play"
    >
      <fa-icon [icon]="faPlay" />
    </button>
    <button class="text-2xl transition hover:text-[var(--color-accent)]" aria-label="Next">
      <fa-icon [icon]="faNext" />
    </button>
    <div class="ml-3 flex flex-col gap-1 text-sm">
      <button class="transition hover:text-[var(--color-accent)]" aria-label="Shuffle">
        <fa-icon [icon]="faShuffle" />
      </button>
      <button class="transition hover:text-[var(--color-accent)]" aria-label="Repeat">
        <fa-icon [icon]="faRepeat" />
      </button>
    </div>
  </div>

  <div
    class="mx-4 flex h-16 items-center rounded border border-[var(--color-border)] bg-[var(--color-bg-elevated)] px-4 shadow-inner"
  >
    <div class="h-12 w-12 rounded bg-[var(--color-bg-tertiary)]"></div>
    <div class="ml-3 flex flex-col">
      <span class="text-sm font-semibold text-[var(--color-text-primary)]">Nothing playing</span>
      <span class="text-xs text-[var(--color-text-muted)]">—</span>
    </div>
  </div>

  <div class="flex items-center justify-end gap-3 text-[var(--color-text-secondary)]">
    <span class="rounded bg-[var(--color-bg-elevated)] px-2 py-1 text-xs font-mono">—</span>
    <span class="rounded bg-[var(--color-bg-elevated)] px-2 py-1 text-xs font-mono">—</span>
  </div>
</div>
