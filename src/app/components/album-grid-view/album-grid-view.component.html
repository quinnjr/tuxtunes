<div class="h-full overflow-y-auto p-4">
  @if (library.albums().length === 0) {
    <div class="flex h-full items-center justify-center text-[var(--color-text-muted)]">
      No albums in library
    </div>
  } @else {
    <div class="grid grid-cols-[repeat(auto-fill,minmax(180px,1fr))] gap-4">
      @for (a of library.albums(); track trackByAlbum($index, a)) {
        <div class="flex flex-col gap-2" (contextmenu)="onAlbumContextMenu(a, $event)">
          <button type="button" (click)="toggle(a)" class="group flex flex-col gap-2 text-left">
            <div class="aspect-square overflow-hidden rounded bg-[var(--color-bg-elevated)] shadow">
              @if (coverUrl(a.artworkPath); as src) {
                <img [src]="src" alt="" class="h-full w-full object-cover" />
              } @else {
                <div
                  class="flex h-full w-full items-center justify-center text-[var(--color-text-muted)]"
                >
                  <span class="text-[10px] uppercase tracking-wider">No art</span>
                </div>
              }
            </div>
            <div class="flex flex-col">
              <span class="truncate text-sm text-[var(--color-text-primary)]">{{ a.album }}</span>
              <span class="truncate text-xs text-[var(--color-text-secondary)]">
                {{ a.albumArtist }}
                @if (a.year) {
                  <span class="text-[var(--color-text-muted)]"> · {{ a.year }}</span>
                }
              </span>
              <span class="text-[10px] text-[var(--color-text-muted)]">
                {{ a.trackCount }} {{ a.trackCount === 1 ? 'track' : 'tracks' }}
              </span>
            </div>
          </button>
          @if (isExpanded(a)) {
            <ul
              class="divide-y divide-[var(--color-border)] rounded bg-[var(--color-bg-surface)] text-xs"
            >
              @for (t of expandedTracks(); track trackByTrack($index, t)) {
                <li
                  (dblclick)="play(t)"
                  (contextmenu)="onTrackContextMenu(t, $event); $event.stopPropagation()"
                  class="flex cursor-pointer items-center gap-2 px-2 py-1 hover:bg-[var(--color-bg-elevated)]"
                >
                  <span class="flex-1 truncate">{{ t.title }}</span>
                  <span class="text-[var(--color-text-muted)]">{{
                    formatDuration(t.durationMs)
                  }}</span>
                </li>
              }
            </ul>
          }
        </div>
      }
    </div>
  }
</div>
