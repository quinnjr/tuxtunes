<aside
  class="flex h-full w-64 flex-col border-r border-[var(--color-border)] bg-[var(--color-bg-surface)] py-3 text-sm text-[var(--color-text-secondary)]"
>
  <div
    class="px-4 pb-2 text-xs font-semibold uppercase tracking-wider text-[var(--color-text-muted)]"
  >
    Library
  </div>
  <button class="px-4 py-1 text-left hover:bg-[var(--color-bg-elevated)]">All Songs</button>
  <button class="px-4 py-1 text-left hover:bg-[var(--color-bg-elevated)]">Artists</button>
  <button class="px-4 py-1 text-left hover:bg-[var(--color-bg-elevated)]">Albums</button>
  <button class="px-4 py-1 text-left hover:bg-[var(--color-bg-elevated)]">Genres</button>

  <button
    (click)="add()"
    class="mx-4 mt-4 flex items-center gap-2 rounded bg-[var(--color-bg-elevated)] px-3 py-2 text-left text-sm text-[var(--color-text-primary)] transition hover:bg-[var(--color-bg-tertiary)]"
  >
    <fa-icon [icon]="faPlus" />
    Add Files…
  </button>

  <div
    class="mt-4 px-4 pb-2 text-xs font-semibold uppercase tracking-wider text-[var(--color-text-muted)]"
  >
    Playlists
  </div>
  <div class="px-4 py-1 italic text-[var(--color-text-muted)]">No playlists yet</div>
</aside>
