<cdk-virtual-scroll-viewport itemSize="36" class="h-full">
  <div
    *cdkVirtualFor="let track of library.tracks(); trackBy: trackById"
    class="flex h-9 cursor-pointer items-center border-b border-[var(--color-border)] px-4 text-sm hover:bg-[var(--color-bg-elevated)]"
    [class.bg-\[var\(--color-bg-elevated\)\]]="playback.currentTrackId() === track.id"
    (dblclick)="play(track)"
  >
    <span class="flex-1 truncate">{{ track.title }}</span>
    <span class="w-48 truncate text-[var(--color-text-secondary)]">{{ track.artist ?? '' }}</span>
    <span class="w-48 truncate text-[var(--color-text-secondary)]">{{ track.album ?? '' }}</span>
    <span class="w-16 text-right text-[var(--color-text-muted)]">{{
      formatDuration(track.durationMs)
    }}</span>
  </div>
</cdk-virtual-scroll-viewport>
